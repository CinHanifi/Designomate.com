<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designomate</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
scroll-behavior:smooth;
}

body{
color:white;
}

/* VIDEO BACKGROUND */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* DARK MODE */
.dark{
background:black;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.5);
position:fixed;
width:100%;
z-index:10;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
border-radius:10px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#FFD700;
cursor:pointer;
}

/* SECTION */
section{
padding:100px 20px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
}

/* FORM */
input, textarea{
width:80%;
padding:10px;
margin:10px;
border:none;
border-radius:10px;
}

/* CHATBOT */
#chatbot{
position:fixed;
bottom:20px;
left:20px;
background:#222;
padding:15px;
border-radius:10px;
display:none;
}

/* BUTTONS */
.toggle{
cursor:pointer;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
<div class="logo">
<img src="img/logo.jpg">
<h2>Designomate</h2>
</div>

<ul>
<li><a href="#home">Ana Sayfa</a></li>
<li><a href="#services">Hizmetler</a></li>
<li><a href="#portfolio">Portföy</a></li>
<li><a href="#contact">İletişim</a></li>
</ul>

<div class="toggle" onclick="darkMode()">🌙</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<h1>Profesyonel Dijital Çözümler</h1>
<button class="btn" onclick="openChat()">💬 Mesaj At</button>
</section>

<!-- SERVICES -->
<section id="services">
<h2>Hizmetler</h2>

<div class="grid">
<div class="card"><img src="img/otomasyon.jpg"><h3>Otomasyon</h3></div>
<div class="card"><img src="img/3dmodel.jpg"><h3>3D</h3></div>
<div class="card"><img src="img/afis.jpg"><h3>Tasarım</h3></div>
<div class="card"><img src="img/video.jpg"><h3>Video</h3></div>
</div>

</section>

<!-- PORTFOLYO -->
<section id="portfolio">
<h2>Portföy</h2>
<div class="grid">
<img src="img/afis.jpg">
<img src="img/3dmodel.jpg">
<img src="img/video.jpg">
</div>
</section>

<!-- CONTACT FORM -->
<section id="contact">
<h2>İletişim</h2>

<input type="text" placeholder="Adınız">
<input type="email" placeholder="Email">
<textarea placeholder="Mesajınız"></textarea>
<br>
<button class="btn">Gönder</button>

</section>

<!-- CHATBOT -->
<div id="chatbot">
<p>Merhaba 👋 nasıl yardımcı olayım?</p>
</div>

<script>

function darkMode(){
document.body.classList.toggle("dark");
}

function openChat(){
let bot = document.getElementById("chatbot");
bot.style.display = bot.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
